name: Publish To npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: >-
          node --input-type=module -e
          "import pkg from './package.json' with { type: 'json' };
          if (process.env.RELEASE_TAG !== 'v' + pkg.version) {
          throw new Error('Release tag ' + process.env.RELEASE_TAG +
          ' does not match package version ' + pkg.version); }"
      - name: Check whether this version is already on npm
        id: published
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "reddial@${VERSION}" version >/dev/null 2>&1; then
            echo "reddial@${VERSION} is already on npm; skipping publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm ci
        if: steps.published.outputs.exists == 'false'
      - run: npm run typecheck
        if: steps.published.outputs.exists == 'false'
      - run: npm run typecheck:examples
        if: steps.published.outputs.exists == 'false'
      - run: npm test
        if: steps.published.outputs.exists == 'false'
      - run: npm run package:smoke
        if: steps.published.outputs.exists == 'false'
      - run: npm publish --access public
        if: steps.published.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
